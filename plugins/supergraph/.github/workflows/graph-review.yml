name: Graph Review
on:
  pull_request:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install code-review-graph
        run: pip install code-review-graph

      - name: Build graph
        run: code-review-graph build

      - name: Detect changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "count=$(echo "$CHANGED" | wc -l)" >> $GITHUB_OUTPUT

      - name: Graph analysis
        run: |
          echo "## Graph Review" >> $GITHUB_STEP_SUMMARY
          echo "- Changed files: ${{ steps.changes.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changed Files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.changes.outputs.files }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          code-review-graph status >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        run: |
          if [ -f "package.json" ]; then
            npm ci && npm test
          elif [ -f "pyproject.toml" ]; then
            pip install -e ".[dev]" && pytest
          elif [ -f "go.mod" ]; then
            go test ./...
          elif [ -f "Cargo.toml" ]; then
            cargo test
          fi

      - name: Run linter
        run: |
          if [ -f "package.json" ]; then
            npm run lint || true
          elif [ -f "pyproject.toml" ]; then
            ruff check . || flake8 . || true
          elif [ -f "go.mod" ]; then
            golangci-lint run || true
          elif [ -f "Cargo.toml" ]; then
            cargo clippy || true
          fi
